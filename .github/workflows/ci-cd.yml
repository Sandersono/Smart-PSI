name: CI-CD

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Backend Tests
        run: npm test

  docker_image:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL || 'https://your-project-ref.supabase.co' }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY || 'your-anon-key' }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/smart-psi:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/smart-psi:latest

  deploy_vps:
    runs-on: ubuntu-latest
    needs: docker_image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.VPS_HOST != ''
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -eu
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            export IMAGE_TAG=${{ github.sha }}
            export GHCR_OWNER=${{ github.repository_owner }}
            docker compose --env-file .env.production pull app
            docker compose --env-file .env.production up -d --remove-orphans
            docker image prune -f
